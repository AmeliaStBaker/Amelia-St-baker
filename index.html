<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<meta name="description" content="Something new is on the way.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0c0f;
    --bg-2: #15131a;
    --ink: #f4f1ea;
    --muted: #9c96a8;
    --accent: #e8a05c;
    --accent-soft: #c97b8f;
    --line: rgba(244, 241, 234, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Hanken Grotesk", sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
    padding: 2rem;
  }

  /* atmospheric gradient mesh */
  .mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(60% 50% at 20% 18%, rgba(232, 160, 92, 0.18), transparent 70%),
      radial-gradient(55% 45% at 82% 78%, rgba(201, 123, 143, 0.16), transparent 70%),
      radial-gradient(70% 60% at 50% 50%, var(--bg-2), var(--bg) 80%);
    animation: drift 22s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0%   { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.12) translate(-2%, 1.5%); }
  }

  /* grain overlay */
  .grain {
    position: fixed;
    inset: -50%;
    z-index: 1;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 640px;
    text-align: center;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.4rem;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.1s forwards;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }

  h1 {
    font-family: "Fraunces", serif;
    font-weight: 350;
    font-size: clamp(2.8rem, 8vw, 5.4rem);
    line-height: 1.02;
    letter-spacing: -0.02em;
    margin-bottom: 1.6rem;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  h1 .line {
    display: block;
    overflow: hidden;
  }

  h1 .line > span {
    display: block;
    transform: translateY(110%);
    animation: rise 1s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
  }

  h1 .line:nth-child(1) > span { animation-delay: 0.25s; }
  h1 .line:nth-child(2) > span { animation-delay: 0.4s; }

  @keyframes rise {
    to { transform: translateY(0); opacity: 1; }
  }

  p.lede {
    font-size: clamp(1rem, 2.4vw, 1.15rem);
    line-height: 1.6;
    color: var(--muted);
    max-width: 46ch;
    margin: 0 auto 2.8rem;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.6s forwards;
  }

  .rule {
    width: 64px;
    height: 1px;
    background: var(--line);
    margin: 0 auto 2.8rem;
    transform: scaleX(0);
    transform-origin: center;
    animation: grow 1s ease 0.7s forwards;
  }

  @keyframes grow { to { transform: scaleX(1); } }

  .footer {
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.85s forwards;
  }

  .footer a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 2px;
    transition: border-color 0.3s ease, color 0.3s ease;
  }

  .footer a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>
  <div class="mesh"></div>
  <div class="grain"></div>

  <main class="wrap">
    <span class="eyebrow"><span class="dot"></span>Work in progress</span>

    <h1>
      <span class="line"><span>Something new</span></span>
      <span class="line"><span>is <em>on the way</em></span></span>
    </h1>

    <div class="rule"></div>

    <p class="lede">
      We're putting the finishing touches on a refreshed experience.
      Check back shortly &mdash; it'll be worth the wait.
    </p>

    <p class="footer">
      Questions? <a href="mailto:amelia@ninjaalliedhealth.com">Get in touch</a>
    </p>
  </main>
</body>
</html>
